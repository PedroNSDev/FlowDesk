<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Projetos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" class="container">
    <div class="login-box">
        <h2>Login</h2>
        <div id="login-error" class="error">Credenciais inválidas</div>
        <input id="username" placeholder="Usuário">
        <input id="password" type="password" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>
</div>

<div id="dashboard-screen" class="container hidden">
    <header class="top-header">
        <div class="user-info">
            <span id="display-user"></span>
        </div>
        <button class="btn-logout" onclick="fazerLogout()" title="Sair">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </button>
    </header>

    <div id="projetos-container"></div>

    <div id="logs-container" class="hidden">
        <h3>Logs</h3>
        <div id="log-entries"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
